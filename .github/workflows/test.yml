name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        uses: bats-core/bats-action@2.0.0

      - name: Install jq
        run: sudo apt-get install -y jq bc

      - name: Run unit tests
        run: bats tests/unit/ --recursive
